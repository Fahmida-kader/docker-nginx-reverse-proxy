services:
  app1:
    image: nginx:latest
    container_name: app1
    volumes:
      - ./app1:/usr/share/nginx/html

  app2:
    image: nginx:latest
    container_name: app2
    volumes:
      - ./app2:/usr/share/nginx/html

  reverse-proxy:
    image: nginx:latest
    container_name: reverse-proxy

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app1
      - app2
